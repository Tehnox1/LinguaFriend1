<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinguaFriend</title>
  <link rel="stylesheet" href="./static/style.css" />
</head>
<body>
  <main class="app">
    <section class="phone-shell">
      <header class="top-glass">
        <div class="top-pill">LinguaFriend</div>
        <button id="topMenuBtn" class="top-menu-btn" type="button" aria-label="Меню">⋮</button>
      </header>

      <div id="menuOverlay" class="menu-overlay" hidden>
        <div id="menuBackdrop" class="menu-backdrop"></div>
        <section class="menu-panel" aria-label="Меню">
          <div class="menu-head">
            <h2>Меню</h2>
            <button id="closeMenuBtn" class="menu-close" type="button" aria-label="Закрыть">×</button>
          </div>

          <div class="menu-block">
            <span class="menu-label">Подсказки</span>
            <button id="hintToggle" class="hint-switch" type="button" aria-pressed="true">
              <span class="hint-switch-track">
                <span class="hint-switch-thumb"></span>
              </span>
            </button>
          </div>

          <div class="menu-block menu-levels">
            <span class="menu-label">Сложность</span>
            <div class="level-pills">
              <button class="level-pill" data-level="A1" type="button">Легко</button>
              <button class="level-pill" data-level="A2" type="button">Средний</button>
              <button class="level-pill" data-level="B1" type="button">Сложный</button>
            </div>
          </div>

          <div class="menu-block menu-leaderboard-trigger">
            <span class="menu-label centered-label">Leaderboard</span>
            <button id="openLeaderboardBtn" class="leaderboard-open-btn" type="button">Открыть список</button>
          </div>
        </section>
      </div>

      <div id="leaderboardOverlay" class="menu-overlay" hidden>
        <div id="leaderboardBackdrop" class="menu-backdrop"></div>
        <section class="menu-panel leaderboard-panel" aria-label="Leaderboard">
          <div class="menu-head">
            <h2>Leaderboard</h2>
            <button id="closeLeaderboardBtn" class="menu-close" type="button" aria-label="Закрыть">×</button>
          </div>
          <div id="leaderboardList" class="leaderboard-list"></div>
        </section>
      </div>

      <section class="chat-glass">
        <div id="messages" class="messages"></div>
      </section>

      <section class="bottom-actions">
        <div class="group-shell">
          <div class="group-row">
            <button id="nextBtn">Новое задание</button>
            <button id="moreInfoBtn">Больше информации</button>
          </div>
        </div>
      </section>

      <form id="answerForm" class="answer-glass">
        <div class="answer-shell">
          <input id="answerInput" type="text" placeholder="Введите ваш перевод..." autocomplete="off" />
          <button type="submit" class="send-btn" aria-label="Отправить">
            <span class="send-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img" focusable="false">
                <path d="M3 20.5l17.36-8.04c.85-.39.85-1.53 0-1.92L3 2.5l2.87 7.14 8.17 1.32-8.17 1.32L3 20.5z"></path>
              </svg>
            </span>
          </button>
        </div>
      </form>
    </section>
  </main>

  <script src="./config.js"></script>
  <script src="./static/app.js"></script>
</body>
</html>
